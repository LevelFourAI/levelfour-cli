version: "2"

linters:
  enable:
    - bodyclose
    - dupl
    - errcheck
    - gocyclo
    - godot
    - goconst
    - gocritic
    - gosec
    - govet
    - misspell
    - nilerr
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 200
    goconst:
      min-len: 3
      min-occurrences: 3
    nolintlint:
      require-explanation: true
      require-specific: true
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fscanln
        - (io.Closer).Close
    gosec:
      excludes:
        - G104
        - G204
        - G704
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    paths:
      - vendor
    rules:
      - path: _test\.go
        linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
