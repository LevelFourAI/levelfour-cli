name: Bug Report
description: Report a bug in the LevelFour CLI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal command(s) or steps to reproduce the issue.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: "Output of: l4 --version"
      placeholder: "l4 version 0.1.0 (commit: abc1234)"
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Install method
      placeholder: "homebrew / go install / GitHub release tarball / built from source"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: false
